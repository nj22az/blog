name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Verify secrets availability
        run: |
          if [ -z "${{ secrets.REACT_APP_EMAILJS_SERVICE_ID }}" ]; then
            echo "Error: REACT_APP_EMAILJS_SERVICE_ID is not set"
            exit 1
          fi
          if [ -z "${{ secrets.REACT_APP_EMAILJS_NOTIFICATION_TEMPLATE_ID }}" ]; then
            echo "Error: REACT_APP_EMAILJS_NOTIFICATION_TEMPLATE_ID is not set"
            exit 1
          fi
          if [ -z "${{ secrets.REACT_APP_EMAILJS_AUTOREPLY_TEMPLATE_ID }}" ]; then
            echo "Error: REACT_APP_EMAILJS_AUTOREPLY_TEMPLATE_ID is not set"
            exit 1
          fi
          if [ -z "${{ secrets.REACT_APP_EMAILJS_PUBLIC_KEY }}" ]; then
            echo "Error: REACT_APP_EMAILJS_PUBLIC_KEY is not set"
            exit 1
          fi

      - name: Create .env file
        shell: bash
        run: |
          {
            echo "REACT_APP_EMAILJS_SERVICE_ID='${{ secrets.REACT_APP_EMAILJS_SERVICE_ID }}'"
            echo "REACT_APP_EMAILJS_NOTIFICATION_TEMPLATE_ID='${{ secrets.REACT_APP_EMAILJS_NOTIFICATION_TEMPLATE_ID }}'"
            echo "REACT_APP_EMAILJS_AUTOREPLY_TEMPLATE_ID='${{ secrets.REACT_APP_EMAILJS_AUTOREPLY_TEMPLATE_ID }}'"
            echo "REACT_APP_EMAILJS_PUBLIC_KEY='${{ secrets.REACT_APP_EMAILJS_PUBLIC_KEY }}'"
          } > .env

      - name: Build project
        env:
          REACT_APP_EMAILJS_SERVICE_ID: ${{ secrets.REACT_APP_EMAILJS_SERVICE_ID }}
          REACT_APP_EMAILJS_NOTIFICATION_TEMPLATE_ID: ${{ secrets.REACT_APP_EMAILJS_NOTIFICATION_TEMPLATE_ID }}
          REACT_APP_EMAILJS_AUTOREPLY_TEMPLATE_ID: ${{ secrets.REACT_APP_EMAILJS_AUTOREPLY_TEMPLATE_ID }}
          REACT_APP_EMAILJS_PUBLIC_KEY: ${{ secrets.REACT_APP_EMAILJS_PUBLIC_KEY }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: build

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
